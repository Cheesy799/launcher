<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Launcher">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>Minimal Launcher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400&family=DM+Mono:wght@300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.10);
    --glass-hover: rgba(255,255,255,0.12);
    --text: rgba(255,255,255,0.92);
    --text-dim: rgba(255,255,255,0.40);
    --blur: blur(28px);
    --radius: 22px;
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  html, body {
    height: 100%; font-family: 'DM Sans', sans-serif; font-weight: 300;
    background: #0a0a0f; color: var(--text); overflow: hidden;
    -webkit-font-smoothing: antialiased; user-select: none;
  }

  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 65% 45% at 25% 15%, rgba(55,55,75,0.55) 0%, transparent 60%),
      radial-gradient(ellipse 55% 55% at 78% 82%, rgba(25,25,45,0.65) 0%, transparent 60%),
      #0a0a0f;
  }

  .phone {
    position: relative; z-index: 1; max-width: 390px; height: 100dvh;
    margin: 0 auto; display: flex; flex-direction: column;
    padding: env(safe-area-inset-top, 16px) 20px env(safe-area-inset-bottom, 20px);
  }

  /* STATUS BAR */
  .statusbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 4px 6px; font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--text-dim); letter-spacing: 0.03em;
  }
  .statusbar .time { font-size: 14px; color: var(--text); font-weight: 400; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .sig { display: flex; gap: 2px; align-items: flex-end; }
  .sig span { width: 3px; background: var(--text-dim); border-radius: 1px; }
  .sig span:nth-child(1){height:4px;} .sig span:nth-child(2){height:7px;}
  .sig span:nth-child(3){height:10px;} .sig span:nth-child(4){height:13px;background:var(--text);}
  .bat { width: 18px; height: 10px; border: 1.5px solid var(--text-dim); border-radius: 2px; position:relative; }
  .bat::before { content:''; position:absolute; right:-4px; top:50%; transform:translateY(-50%); width:2px; height:5px; background:var(--text-dim); border-radius:0 1px 1px 0; }
  .bat::after { content:''; position:absolute; left:1px; top:1px; bottom:1px; width:70%; background:var(--text); border-radius:1px; }

  /* WIDGETS */
  .widgets { flex: 0 0 auto; padding: 12px 0 14px; }
  .widget-row { display: flex; gap: 12px; margin-bottom: 12px; }

  .widget {
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: var(--radius); padding: 16px;
    transition: background var(--transition), transform var(--transition);
    cursor: pointer; flex: 1;
  }
  .widget:active { transform: scale(0.97); background: var(--glass-hover); }
  .widget.wide { flex: 2; }
  .widget.tall { min-height: 110px; }

  .widget-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-dim); margin-bottom: 8px; display: flex; align-items: center; gap: 5px;
  }
  .widget-big { font-size: 28px; font-weight: 200; line-height: 1; letter-spacing: -0.02em; }
  .widget-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .widget-toggle { display: flex; flex-direction: column; gap: 10px; }
  .toggle-row { display: flex; justify-content: space-between; align-items: center; }
  .toggle-name { font-size: 12px; color: var(--text-dim); }
  .toggle { position: relative; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track {
    position: absolute; inset: 0; background: rgba(255,255,255,0.1);
    border-radius: 20px; border: 1px solid var(--glass-border);
    transition: background 0.3s; cursor: pointer;
  }
  .toggle input:checked + .toggle-track { background: rgba(255,255,255,0.6); }
  .toggle-thumb {
    position: absolute; left: 3px; top: 3px;
    width: 12px; height: 12px; background: white; border-radius: 50%;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); pointer-events: none;
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

  /* APPS */
  .apps-section {
    flex: 1; display: flex; flex-direction: column;
    justify-content: flex-end; padding-bottom: 8px;
  }
  .apps-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-dim); padding: 0 2px 14px;
  }
  .apps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

  .app-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 9px; cursor: pointer; text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }

  .app-icon {
    width: 72px; height: 72px;
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    transition: transform var(--transition), background var(--transition), box-shadow var(--transition);
    position: relative; overflow: hidden;
  }
  .app-icon::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 100%);
    border-radius: 20px 20px 0 0; pointer-events: none;
  }
  .app-icon svg {
    width: 26px; height: 26px;
    stroke: rgba(255,255,255,0.82); fill: none;
    stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    position: relative; z-index: 1;
  }
  .app-item:active .app-icon {
    transform: scale(0.90);
    background: var(--glass-hover);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 10px 30px rgba(0,0,0,0.5);
  }

  .app-badge {
    position: absolute; top: -4px; right: -4px;
    background: rgba(255,255,255,0.88); color: #0a0a0f;
    font-size: 9px; font-weight: 700; font-family: 'DM Mono', monospace;
    min-width: 17px; height: 17px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center; padding: 0 4px;
    z-index: 3; border: 1.5px solid #0a0a0f;
  }

  .app-name { font-size: 11px; color: var(--text-dim); letter-spacing: 0.02em; font-weight: 300; }

  /* DOCK */
  .dock {
    margin-top: 18px; backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 28px; padding: 14px 24px;
    display: flex; justify-content: center; align-items: center; gap: 8px;
  }
  .dock-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.18); }
  .dock-dot.active { background: rgba(255,255,255,0.7); }

  /* Power save */
  body.power-save .bg { background: #060609; }
  body.power-save .app-icon,
  body.power-save .widget,
  body.power-save .dock {
    backdrop-filter: none; -webkit-backdrop-filter: none;
    background: rgba(255,255,255,0.05);
  }
  body.power-save * { animation: none !important; }

  /* Offline banner */
  #offline-banner {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: rgba(20,20,25,0.9); backdrop-filter: blur(16px);
    border-top: 1px solid rgba(255,255,255,0.08);
    text-align: center; padding: 10px 20px;
    font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em;
  }
  body.offline #offline-banner { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .widgets { animation: fadeUp 0.45s ease both; }
  .apps-section { animation: fadeUp 0.45s 0.08s ease both; }
  .dock { animation: fadeUp 0.45s 0.16s ease both; }
</style>
</head>
<body>
<div class="bg"></div>
<div id="offline-banner">⚡ Offline mode — launcher still works</div>

<div class="phone">

  <div class="statusbar">
    <span class="time" id="clock">00:00</span>
    <div class="status-icons">
      <div class="sig"><span></span><span></span><span></span><span></span></div>
      <span style="font-size:10px;">5G</span>
      <div class="bat"></div>
    </div>
  </div>

  <div class="widgets">
    <div class="widget-row">

      <div class="widget tall">
        <div class="widget-label">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="2" width="8" height="7" rx="1" stroke="currentColor" stroke-width="1"/><path d="M3 1v2M7 1v2" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
          Date
        </div>
        <div class="widget-big" id="day">—</div>
        <div class="widget-sub" id="fulldate">—</div>
      </div>

      <div class="widget tall wide">
        <div class="widget-label">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="2" stroke="currentColor" stroke-width="1"/><path d="M5 1.5V1M5 9v-.5M1.5 5H1M9 5h-.5M2.6 2.6l-.4-.4M7.8 7.8l-.4-.4M2.6 7.4l-.4.4M7.8 2.2l-.4.4" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
          Weather
        </div>
        <div class="widget-big" id="weather-temp">—°</div>
        <div class="widget-sub" id="weather-desc">—</div>
        <div style="margin-top:10px;display:flex;gap:10px;">
          <div style="font-size:10px;color:rgba(255,255,255,0.3);" id="weather-h">H —°</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.3);" id="weather-l">L —°</div>
        </div>
      </div>

    </div>

    <div class="widget-row">

      <div class="widget wide">
        <div class="widget-label">Quick Controls</div>
        <div class="widget-toggle">
          <div class="toggle-row">
            <span class="toggle-name">Wi-Fi</span>
            <label class="toggle"><input type="checkbox" checked><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
          </div>
          <div class="toggle-row">
            <span class="toggle-name">Bluetooth</span>
            <label class="toggle"><input type="checkbox" checked><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
          </div>
          <div class="toggle-row">
            <span class="toggle-name">Power Save</span>
            <label class="toggle"><input type="checkbox" id="powerSave" onchange="togglePower(this)"><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
          </div>
        </div>
      </div>

      <div class="widget">
        <div class="widget-label">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 8l2-3 2 2 2-4" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Steps
        </div>
        <div class="widget-big">6.2k</div>
        <div class="widget-sub">of 10k</div>
        <div style="margin-top:10px;height:3px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;">
          <div style="width:62%;height:100%;background:rgba(255,255,255,0.5);border-radius:3px;"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- 6 APPS -->
  <div class="apps-section">
    <div class="apps-label">Apps</div>
    <div class="apps-grid">

      <!-- Phone -->
      <a class="app-item" href="tel:">
        <div class="app-icon">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" transform="translate(1,1)"/></svg>
          <div class="app-badge">2</div>
        </div>
        <span class="app-name">Phone</span>
      </a>

      <!-- Messages / SMS -->
      <a class="app-item" href="sms:">
        <div class="app-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <div class="app-badge">5</div>
        </div>
        <span class="app-name">Messages</span>
      </a>

      <!-- Camera -->
      <a class="app-item" href="camera:">
        <div class="app-icon">
          <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
        <span class="app-name">Camera</span>
      </a>

      <!-- Maps -->
      <a class="app-item" href="maps:">
        <div class="app-icon">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <span class="app-name">Maps</span>
      </a>

      <!-- Music / Spotify fallback -->
      <a class="app-item" href="music:" id="music-link">
        <div class="app-icon">
          <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <span class="app-name">Music</span>
      </a>

      <!-- Settings -->
      <a class="app-item" href="app-settings:">
        <div class="app-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </div>
        <span class="app-name">Settings</span>
      </a>

    </div>
  </div>

  <div class="dock">
    <div class="dock-dot active"></div>
    <div class="dock-dot"></div>
    <div class="dock-dot"></div>
  </div>

</div>

<script>
  // Clock — updates every 30s (not every second = power efficient)
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0');
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('day').textContent = days[now.getDay()];
    document.getElementById('fulldate').textContent =
      months[now.getMonth()] + ' ' + now.getDate() + ' · ' + now.getFullYear();
  }
  updateClock();
  setInterval(updateClock, 30000);

  // Power save toggle
  function togglePower(cb) {
    document.body.classList.toggle('power-save', cb.checked);
  }

  // Offline detection
  function updateOnline() { document.body.classList.toggle('offline', !navigator.onLine); }
  window.addEventListener('online', updateOnline);
  window.addEventListener('offline', updateOnline);
  updateOnline();

  // Service Worker — enables full offline use
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // iOS deep-link detection: use apple maps / music if iOS
  const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
  const isAndroid = /Android/.test(navigator.userAgent);
  if (isIOS) {
    document.querySelector('a[href="maps:"]').href = 'maps://';
    document.getElementById('music-link').href = 'youtubemusic://';
    document.querySelector('a[href="app-settings:"]').href = 'app-settings://';
  } else if (isAndroid) {
    // Android intents
    document.querySelector('a[href="camera:"]').href = 'intent:#Intent;action=android.media.action.STILL_IMAGE_CAMERA;end';
    document.querySelector('a[href="maps:"]').href = 'geo:0,0';
    document.getElementById('music-link').href = 'intent:#Intent;package=com.google.android.apps.youtube.music;end';
    document.querySelector('a[href="app-settings:"]').href = 'intent:#Intent;action=android.settings.SETTINGS;end';
  }

  // Live weather via Open-Meteo (free, no key needed)
  async function loadWeather() {
    try {
      const pos = await new Promise((res, rej) =>
        navigator.geolocation.getCurrentPosition(res, rej, { timeout: 6000 })
      );
      const { latitude: lat, longitude: lon } = pos.coords;
      const r = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current_weather=true&daily=temperature_2m_max,temperature_2m_min` +
        `&temperature_unit=celsius&timezone=auto&forecast_days=1`
      );
      const d = await r.json();
      const codes = {0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',
        45:'Foggy',48:'Foggy',51:'Drizzle',53:'Drizzle',55:'Drizzle',
        61:'Rain',63:'Rain',65:'Heavy Rain',71:'Snow',73:'Snow',75:'Heavy Snow',
        80:'Showers',81:'Showers',82:'Heavy Showers',95:'Thunderstorm',99:'Thunderstorm'};
      document.getElementById('weather-temp').textContent = Math.round(d.current_weather.temperature) + '°';
      document.getElementById('weather-desc').textContent = codes[d.current_weather.weathercode] || 'Clear';
      document.getElementById('weather-h').textContent = 'H ' + Math.round(d.daily.temperature_2m_max[0]) + '°';
      document.getElementById('weather-l').textContent = 'L ' + Math.round(d.daily.temperature_2m_min[0]) + '°';
    } catch {
      document.getElementById('weather-desc').textContent = 'Unavailable';
    }
  }
  loadWeather();
</script>
</body>
</html>
